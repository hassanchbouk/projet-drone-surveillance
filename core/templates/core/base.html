{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Drone Surveillance{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'core/css/style.css' %}">
</head>
<body>
    <header class="topbar">
        <div class="container topbar-inner">
            <div class="brand-block">
                <p class="brand-kicker">Surveillance autonome indoor</p>
                <h1 class="brand-title">Projet Drone Surveillance</h1>
            </div>

            <nav class="nav">
                <a href="{% url 'dashboard' %}" class="nav-link">Tableau de bord</a>
                <a href="{% url 'site_list' %}" class="nav-link">Sites</a>
                <a href="{% url 'mission_list' %}" class="nav-link">Missions</a>
            </nav>
        </div>
    </header>

    <main class="page-shell">
        <div class="container">
            {% block content %}{% endblock %}
        </div>
    </main>
</body>
</html>
